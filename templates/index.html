<!DOCTYPE html>
<html>
<head>
    <title>HDB Carpark Info</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
    <h1>HDB Carpark Locations</h1>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>Carpark No</th>
                <th>Address</th>
                <th>X Coord</th>
                <th>Y Coord</th>
            </tr>
        </thead>
        <tbody>
            {% for c in carparks %}
            <tr>
                <td>{{ c['car_park_no'] }}</td>
                <td>{{ c['address'] }}</td>
                <td>{{ c['x_coord'] }}</td>
                <td>{{ c['y_coord'] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
