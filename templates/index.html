<!doctype html><.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
</head>

<body>

<div class="container">

  <h1>{{ app_title }}</h1>

  <p><strong>Resource ID:</strong> {{ resource_id }}</p>
  <p><strong>Last fetched:</strong> {{ fetched_at }} |
     <strong>Total records:</strong> {{ total_ckan }}</p>

  <form method="get">
    <input type="text" name="q" value="{{ q }}" placeholder="Contains filter">
    <button type="submit">Search</button>
  </form>

  <button id="toggleMapBtn">
    Show OneMap
  </button>

  <div id="mapContainer" style="display:none; margin-top:15px;">
    <iframe
      src="https://www.onemap.gov.sg/main/v2/?lat={{ map_center[0] }}&lng={{ map_center[1] }}&zoom=14"
      width="100%"
      height="480"
      style="border:0;"
      loading="lazy">
    </iframe>
  </div>

  <h2>Carpark Data</h2>

  <table id="carparkTable" class="display">
    <thead>
      <tr>
        {% for col in columns %}
          <th>{{ col }}</th>
        {% endfor %}
      </tr>
    </thead>
    <tbody>
      {% for r in rows %}
        <tr>
          {% for col in columns %}
            <td>{{ r.get(col, "") }}</td>
          {% endfor %}
        </tr>
      {% endfor %}
    </tbody>
  </table>

</div>

<script>
$(document).ready(function () {
  $('#carparkTable').DataTable({
    pageLength: 25,
    scrollX: true,
    searching: false
  });

  $('#toggleMapBtn').click(function () {
    $('#mapContainer').toggle();
  });
});
</script>

</body>
</html>

<html>
<head>
  <meta charset="utf-8">
  <title>{{ app_title }}</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">
