
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{{ app_title }}</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css">
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>

<link rel="stylesheet"
      href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

<style>

/* MAP */
#map-wrapper { height:480px; }
#map { height:480px; border-radius:12px; }

/* MARKER */
.marker{
  width:24px;height:24px;
  border-radius:50%;
  display:grid;
  place-items:center;
  font-size:12px;
  font-weight:800;
  color:white;
  background:#f97316;
  border:3px solid #e5e7eb;
  position:relative;
}
.marker.night{ background:#3b82f6; }
.marker.jtc{ border-color:#ec4899; }

/* ✅ AVAILABILITY LABEL */
.marker[data-avail]:not([data-avail=""])::after{
  content:attr(data-avail);
  position:absolute;
  top:28px;
  left:50%;
  transform:translateX(-50%);
  background:#16a34a;
  color:white;
  font-size:10px;
  padding:2px 6px;
  border-radius:6px;
  font-weight:700;
}

.marker[data-avail=""]::after{ display:none; }

</style>
</head>

<body>

<div class="container">

<h2>{{ app_title }}</h2>

<form method="get">
<input name="q" value="{{ q }}">
<button type="submit">Load & Filter Dataset</button>
</form>

<input id="searchBox" placeholder="Filter displayed results">

<div id="map-wrapper"><div id="map"></div></div>

<table id="tbl" class="display">
<thead>
<tr>
<th>#</th>
{% for c in column_keys %}
{% if c not in ['carpark_no_norm','carpark_no'] %}
<th>{{ c }}</th>
{% endif %}
{% endfor %}
</tr>
</thead>

<tbody>
{% for r in rows %}
<tr data-lon="{{ r.get(lon_t_key) }}"
    data-lat="{{ r.get(lat_t_key) }}"
    data-cpnorm="{{ r.get('carpark_no_norm') }}"
    data-src="{{ r.get('data_source','') }}"
    data-night="{{ r.get('night_parking','') }}">
<td></td>

{% for c in column_keys %}
<td>{{ r.get(c) }}</td>
{% endfor %}
</tr>
{% endfor %}
</tbody>
</table>

</div>

<script>
$(function(){

const table = $('#tbl').DataTable();

/* search */
$('#searchBox').on('input',function(){
  table.search(this.value).draw();
});

/* map */
const map = new maplibregl.Map({
  container:'map',
  center:{{ map_center|tojson }},
  zoom:11,
  trackResize:false,
  style:{
    version:8,
    sources:{
      onemap:{
        type:"raster",
        tiles:["https://www.onemap.gov.sg/maps/tiles/Default/{z}/{x}/{y}.png"],
        tileSize:256
      }
    },
    layers:[{id:'base',type:'raster',source:'onemap'}]
  }
});

let markers=[];
let availMap={};

/* ✅ LOAD AVAILABILITY */
async function loadAvailability(){
  try{
    const res=await fetch('/availability.json');
    const j=await res.json();
    availMap=j.data||{};
  }catch(e){
    console.error(e);
  }
}

/* ✅ BUILD AVAIL LABEL */
function buildAvail(cp){
  const lots=availMap[cp];
  if(!lots) return "";

  let parts=[];
  if(lots.C?.available!=null) parts.push(`C:${lots.C.available}`);
  if(lots.H?.available!=null) parts.push(`H:${lots.H.available}`);
  if(lots.Y?.available!=null) parts.push(`Y:${lots.Y.available}`);

  return parts.join(" ");
}

/* ✅ REBUILD MARKERS */
function rebuildMarkers(){

  markers.forEach(m=>m.remove());
  markers=[];

  const rows = table.rows({page:'current'}).nodes().toArray();
  const start = table.page.info().start;

  rows.forEach((tr, idx)=>{

    const rowNum=start+idx+1;
    tr.cells[0].innerText=rowNum;

    const lon=parseFloat(tr.dataset.lon);
    const lat=parseFloat(tr.dataset.lat);
    if(isNaN(lon)||isNaN(lat)) return;

    const el=document.createElement('div');
    el.className='marker';

    const src=(tr.dataset.src||'').toUpperCase();
    const night=(tr.dataset.night||'').toUpperCase();

    if(night==='Y'||night==='YES') el.classList.add('night');
    if(src==='JTC') el.classList.add('jtc');

    /* ✅ APPLY AVAILABILITY */
    const label = buildAvail(tr.dataset.cpnorm);
    el.setAttribute('data-avail', label);

    el.textContent=rowNum;

    markers.push(
      new maplibregl.Marker({element:el})
        .setLngLat([lon,lat])
        .addTo(map)
    );
  });
}

/* ✅ SYNC */
table.on('draw.dt page.dt length.dt search.dt order.dt', ()=>{
  setTimeout(rebuildMarkers,50);
});

/* ✅ INIT */
map.on('load', async()=>{
  await loadAvailability();   /* IMPORTANT */
  rebuildMarkers();

  setInterval(async()=>{
    await loadAvailability();
    rebuildMarkers();
  },60000);
});

});
</script>

</body>
</html>
