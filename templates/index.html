<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ app_title }}</title>

  <!-- ✅ Stylesheet -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

  <!-- ✅ MapLibre -->
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css">
  <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>

  <!-- ✅ DataTables -->
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

  <style>
    #map {
      height: 480px;
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      margin: 12px 0;
      overflow: hidden;
    }

    .marker {
      width: 24px;
      height: 24px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-size: 12px;
      font-weight: 800;
      user-select: none;
      cursor: pointer;

      background: rgba(251,146,60,0.95); /* ✅ DEFAULT = ORANGE */
      color: #ffffff;
      border: 2px solid rgba(255,255,255,0.9);
      box-shadow: 0 2px 8px rgba(0,0,0,0.35);
      position: relative;
    }

    /* ✅ Night parking */
    .marker.blue { background: rgba(59,130,246,0.95) !important; }

    /* ✅ NO night parking → ORANGE */
    .marker.red  { background: rgba(251,146,60,0.95) !important; }

    /* ✅ JTC styling */
    .marker.jtc {
      border-color: #ec4899 !important;
      color: #f472b6 !important;
    }

    /* Availability label */
    .marker[data-avail]:not([data-avail=""])::after {
      content: attr(data-avail);
      position: absolute;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      padding: 2px 6px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 800;
      white-space: nowrap;
      line-height: 14px;
      color: #fff;
      background: rgba(0,0,0,0.65);
    }
