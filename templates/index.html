<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ app_title }}</title>

  <!-- ✅ Correct CSS include -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

  <!-- ✅ MapLibre (proper tags) -->
  <link rel="stylesheet"
        href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css">
  <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>

  <!-- ✅ DataTables -->
  <link rel="stylesheet"
        href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

  <!-- ✅ Styling -->
  <style>
    #map {
      height: 480px;
      width: 100%;
      border-radius: 12px;
      margin: 12px 0;
    }

    .maplibregl-marker {
      transition: transform 200ms ease-out;
    }

    .marker {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 12px;
      font-weight: 800;

      background: #fb923c;
      color: #fff;
      border: 2px solid white;
      position: relative;
    }

    .marker.night { background: #3b82f6; }

    .marker.jtc {
      border-color: #ec4899;
      color: #f472b6;
    }

    .marker[data-avail]:not([data-avail=""])::after {
      content: attr(data-avail);
      position: absolute;
      top: 26px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 6px;
      color: white;
      background: #111;
      white-space: nowrap;
    }

    .marker[data-avail=""]::after { display: none; }
  </style>
</head>

<body>

<h2>{{ app_title }}</h2>

<div id="map"></div>

<table id="carparkTable" class="display">
  <thead>
    <tr>
      <th>#</th>
      {% for c in column_keys %}
        <th>{{ c }}</th>
      {% endfor %}
    </tr>
  </thead>

  <tbody>
    {% for r in rows %}
    <tr
      data-lon="{{ r.get(lon_t_key,'') }}"
      data-lat="{{ r.get(lat_t_key,'') }}"
    >
      <td class="idx"></td>
      {% for c in column_keys %}
      <td>{{ r.get(c,"") }}</td>
      {% endfor %}
    </tr>
    {% endfor %}
  </tbody>
</table>

<script>
$(function(){

  const table = $('#carparkTable').DataTable({
    pageLength: 10
  });

  const map = new maplibregl.Map({
    container:'map',
    center: {{ map_center|tojson }},
    zoom:12,
    style:{
      version:8,
      sources:{
        onemap:{
          type:"raster",
          tiles:["https://www.onemap.gov.sg/maps/tiles/Default/{z}/{x}/{y}.png"],
          tileSize:256
        }
      },
      layers:[{id:'base',type:'raster',source:'onemap'}]
    }
  });

  let markers=[];

  function rebuildMarkers(){

    markers.forEach(m=>m.remove());
    markers=[];

    let nodes = table.rows({page:'current'}).nodes();

    let i=1;

    $(nodes).each(function(){

      const row = table.row(this).data();

      const lon = parseFloat($(this).data('lon'));
      const lat = parseFloat($(this).data('lat'));

      $(this).find('.idx').text(i);

      if(isNaN(lon) || isNaN(lat)){
        i++;
        return;
      }

      const el=document.createElement('div');
      el.className='marker';
      el.innerText=i;

      const mk = new maplibregl.Marker({element:el})
        .setLngLat([lon,lat])
        .addTo(map);

      markers.push(mk);
      i++;
    });
  }

  // ✅ CRITICAL: update markers on ALL table changes
  table.on('draw.dt page.dt length.dt search.dt order.dt', rebuildMarkers);

  map.on('load', rebuildMarkers);

  // ✅ resize fix WITHOUT rebuilding
  function handleResize(){
    map.resize();
    markers.forEach(m=>{
      const p=m.getLngLat();
      m.setLngLat(p);
    });
  }

  let t;
  window.addEventListener('resize', ()=>{
    clearTimeout(t);
    t=setTimeout(handleResize,150);
  });

  const ro=new ResizeObserver(handleResize);
  ro.observe(document.getElementById('map'));

});
</script>

</body>
</html>
