<!doctype html>
 ✅ FIX 1: Correct CSS load --><html lang="en">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

  <!-- ✅ FIX 2: Proper MapLibre loading -->
  <link rel="stylesheet"
        href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css">
  <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>

  <!-- DataTables -->
  <link rel="stylesheet"
        href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

  <style>
    #map {
      height: 480px;
      border-radius: 12px;
      margin: 12px 0;
    }

    /* ✅ Marker circle (number inside) */
    .marker {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 12px;
      font-weight: 800;
      color: #fff;
      border: 2px solid rgba(255,255,255,0.9);
      background: rgba(239,68,68,0.95);
      position: relative;
    }

    /* ✅ Availability OUTSIDE */
    .marker::after {
      content: attr(data-avail);
      position: absolute;
      top: 26px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      font-weight: 700;
      padding: 2px 5px;
      border-radius: 6px;
      background: rgba(0,0,0,0.7);
      color: #fff;
      white-space: nowrap;
    }

    .marker.blue { background: rgba(59,130,246,0.95) !important; }
    .marker.red  { background: rgba(239,68,68,0.95) !important; }

    .marker.jtc {
      border-color: #ec4899 !important;
      color: #f472b6 !important;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>{{ app_title }}</h1>

  <div class="legend">
    Fill: 🔵 Night | 🔴 No Night • Dataset: 🟣 JTC | ⚪ HDB
  </div>

  <div id="map"></div>

  <table id="carparkTable" class="display">
    <thead>
      <tr>
        <th>#</th>
        {% for c in column_keys %}
          <th>{{ c.replace('_',' ') }}</th>
        {% endfor %}
      </tr>
    </thead>
    <tbody>
      {% for r in rows %}
      <tr>
        <td>{{ loop.index }}</td>
        {% for c in column_keys %}
          <td>{{ r.get(c,"") }}</td>
        {% endfor %}
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>

<script>
$(function(){

  if (typeof maplibregl === 'undefined') {
    console.error("MapLibre NOT loaded — map will not render");
    return;
  }

  const table = $('#carparkTable').DataTable({
    pageLength: 10
  });

  const map = new maplibregl.Map({
    container: 'map',
    center: {{ map_center|tojson }},
    zoom: 12,
    style: {
      version: 8,
      sources: {
        onemap: {
          type: "raster",
          tiles: [
            "https://www.onemap.gov.sg/maps/tiles/Default/{z}/{x}/{y}.png"
          ],
          tileSize: 256
        }
      },
      layers: [{ id:'base', type:'raster', source:'onemap' }]
    }
  });

  function norm(v){ return String(v||'').toLowerCase(); }

  function findCol(match){
    let idx = -1;
    $('#carparkTable thead th').each(function(i){
      if (match(norm($(this).text()))) idx = i;
    });
    return idx;
  }

  const lonIdx = findCol(t=>t.includes('longitude'));
  const latIdx = findCol(t=>t.includes('latitude'));
  const srcIdx = findCol(t=>t.includes('source'));
  const nightIdx = findCol(t=>t.includes('night'));
  const availIdx = findCol(t=>t.includes('available') && t.includes('c'));
  const totalIdx = findCol(t=>t.includes('total') && t.includes('c'));

  let markers=[];

  function rebuild(){
    markers.forEach(m=>m.remove());
    markers=[];

    let n=1;

    table.rows({page:'current'}).every(function(){
      const row = this.data();

      const lon = parseFloat(row[lonIdx]);
      const lat = parseFloat(row[latIdx]);
      if (isNaN(lon)||isNaN(lat)) return;

      const night = nightIdx>=0 && norm(row[nightIdx]).includes('yes');
      const jtc = srcIdx>=0 && norm(row[srcIdx])==='jtc';

      const a = row[availIdx]||'';
      const t = row[totalIdx]||'';
      const avail = (a && t) ? `${a}/${t}` : '-/-';

      const el = document.createElement('div');
      el.className = `marker ${night?'blue':'red'}${jtc?' jtc':''}`;
      el.textContent = n;
      el.setAttribute('data-avail', avail);

      markers.push(
        new maplibregl.Marker({element:el})
          .setLngLat([lon,lat])
          .addTo(map)
      );

      n++;
    });
  }

  map.on('load', rebuild);
  table.on('draw', rebuild);

});
</script>

</body>
</html>
<head>
  <meta charset="utf-8">
  <title>{{ app_title }}</title>
