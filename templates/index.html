<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>MapLibre + OneMap (Working)</title>

  <!-- MapLibre CSS -->
  https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css

  <!-- MapLibre JS -->
  https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.jsscript>

  <style>
    body { margin: 0; }
    #map { height: 100vh; }
  </style>
</head>

<body>
<div id="map"></div>

<script>
  const map = new maplibregl.Map({
    container: 'map',
    center: [103.8198, 1.3521], // Singapore
    zoom: 12,
    style: {
      version: 8,
      sources: {
        onemap: {
          type: 'raster',
          tiles: [
            'https://www.onemap.gov.sg/maps/tiles/Default/{z}/{x}/{y}.png'
          ],
          tileSize: 256,
          attribution: '© Singapore Land Authority'
        }
      },
      layers: [
        {
          id: 'onemap-base',
          type: 'raster',
          source: 'onemap'
        }
      ]
    }
  });

  map.addControl(new maplibregl.NavigationControl());
</script>
</body>
</html>
