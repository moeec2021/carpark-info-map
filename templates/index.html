<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{{ app_title }}</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css">

<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

<style>
#map { height:480px; margin:12px 0 }

.marker{
  width:24px;height:24px;border-radius:50%;
  display:grid;place-items:center;font-weight:800;
  color:#fff;background:#fb923c;
  border:2px solid #fff;position:relative;
}

.marker.blue{background:#3b82f6}
.marker.jtc{border-color:#ec4899;color:#f472b6}

.marker[data-avail]:not([data-avail=""])::after{
  content:attr(data-avail);
  position:absolute;top:26px;left:50%;
  transform:translateX(-50%);
  font-size:10px;padding:2px 6px;border-radius:6px;
  background:#111;color:#fff;
}

.marker.avail-green::after{background:#22c55e}
.marker.avail-amber::after{background:#f59e0b}
.marker.avail-red::after{background:#ef4444}

.marker[data-avail=""]::after{display:none}
</style>
</head>

<body>

<h2>{{ app_title }}</h2>

<div id="map"></div>

<table id="carparkTable">
<thead>
<tr>
<th>#</th>
{% for c in column_keys %}
<th>{{ c }}</th>
{% endfor %}
</tr>
</thead>

<tbody>
{% for r in rows %}
<tr
  data-lon="{{ r.get(lon_t_key,'') }}"
  data-lat="{{ r.get(lat_t_key,'') }}"
>
<td>{{ loop.index }}</td>
{% for c in column_keys %}
<td>{{ r.get(c,"") }}</td>
{% endfor %}
</tr>
{% endfor %}
</tbody>
</table>

<script>
$(function(){

const map=new maplibregl.Map({
  container:'map',
  center:{{ map_center|tojson }},
  zoom:12,
  style:{
    version:8,
    sources:{
      onemap:{
        type:"raster",
        tiles:["https://www.onemap.gov.sg/maps/tiles/Default/{z}/{x}/{y}.png"],
        tileSize:256
      }
    },
    layers:[{id:"base",type:"raster",source:"onemap"}]
  }
});

const table=$('#carparkTable').DataTable();

let markers=[];

// ✅ ALWAYS USE DOM DATA ATTRIBUTES (stable)
function rebuildMarkers(){

  markers.forEach(m=>m.remove());
  markers=[];

  let n=1;

  $('#carparkTable tbody tr:visible').each(function(){

    const lon=parseFloat($(this).attr('data-lon'));
    const lat=parseFloat($(this).attr('data-lat'));

    if(isNaN(lon)||isNaN(lat)) return;

    const el=document.createElement('div');
    el.className='marker';
    el.textContent=n;

    markers.push(
      new maplibregl.Marker(el)
        .setLngLat([lon,lat])
        .addTo(map)
    );

    n++;
  });
}

// ✅ INIT
map.on('load', rebuildMarkers);
table.on('draw', rebuildMarkers);

// ✅ RESIZE FIX (NO DRIFT)
function handleResize(){
  map.resize();
  rebuildMarkers();   // ✅ now uses stable coords
}

let resizeTimer;

window.addEventListener('resize', function(){
  clearTimeout(resizeTimer);
  resizeTimer=setTimeout(handleResize,150);
});

const ro = new ResizeObserver(() => {
  handleResize();
});
ro.observe(document.getElementById('map'));

});
</script>

</body>
</html>
