
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ app_title }}</title>

  <!-- ✅ ALWAYS wrap in proper tags -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

  <!-- ✅ MapLibre -->
  <link rel="stylesheet"
        href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css">
  <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>

  <!-- ✅ DataTables + jQuery -->
  <link rel="stylesheet"
        href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

  <style>
    #map {
      height: 480px;
      margin: 12px 0;
      border-radius: 12px;
    }

    .marker {
      width: 24px;
      height: 24px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-size: 12px;
      font-weight: 800;
      background: #fb923c;
      color: white;
    }

    .marker.night {
      background: #3b82f6;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>{{ app_title }}</h2>

  <!-- ✅ FIXED LINKS -->
  <form method="get">
    <input type="text" name="q" value="{{ q }}" placeholder="Server filter">
    <button type="submit">Apply server filter</button>

    /?refresh=1{% if q %}&q={{ q }}{% endif %}Refresh cache</a>

    /download.csv{% if q %}?q={{ q }}{% endif %}
      Download CSV
    </a>
  </form>

  <!-- ✅ CLIENT SEARCH -->
  <input id="searchBox" placeholder="Search table...">

  <div id="map"></div>

  <table id="tbl" class="display">
    <thead>
      <tr>
        <th>#</th>
        {% for c in column_keys %}
        <th>{{ c }}</th>
        {% endfor %}
      </tr>
    </thead>

    <tbody>
      {% for r in rows %}
      <tr data-lon="{{ r.get(lon_t_key,'') }}"
          data-lat="{{ r.get(lat_t_key,'') }}">
        <td></td>
        {% for c in column_keys %}
        <td>{{ r.get(c, "") }}</td>
        {% endfor %}
      </tr>
      {% endfor %}
    </tbody>
  </table>

</div>

<script>

$(function(){

  const table = $('#tbl').DataTable({
    pageLength: 10,
    lengthMenu: [10,25,50,100]
  });

  // ✅ client search
  $('#searchBox').on('input', function(){
    table.search(this.value).draw();
  });

  // ✅ map
  const map = new maplibregl.Map({
    container: 'map',
    center: {{ map_center | tojson }},
    zoom: 11,
    style: {
      version: 8,
      sources: {
        onemap: {
          type: "raster",
          tiles: [
            "https://www.onemap.gov.sg/maps/tiles/Default/{z}/{x}/{y}.png"
          ],
          tileSize: 256
        }
      },
      layers: [{ id:'base', type:'raster', source:'onemap' }]
    }
  });

  let markers = [];

  function rebuildMarkers(){

    markers.forEach(m => m.remove());
    markers = [];

    const nodes = table.rows({page:'current'}).nodes().toArray();

    let i = 1;

    nodes.forEach(tr => {

      const lon = parseFloat(tr.dataset.lon);
      const lat = parseFloat(tr.dataset.lat);

      tr.cells[0].innerText = i;

      // ✅ CRITICAL FIX
      if (isNaN(lon) || isNaN(lat)) {
        i++;
        return;
      }

      const el = document.createElement('div');
      el.className = 'marker';
      el.textContent = i;

      markers.push(
        new maplibregl.Marker({element: el})
          .setLngLat([lon, lat])
          .addTo(map)
      );

      i++;
    });
  }

  // ✅ SINGLE event (fix duplication issues)
  table.on('draw.dt', rebuildMarkers);

  map.on('load', rebuildMarkers);

});

</script>

</body>
</html>
