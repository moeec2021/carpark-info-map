
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ app_title }}</title>

  <!-- ✅ Correct asset tags -->
  {{ url_for('static', filename='style.css') }}
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
  <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css"/script>

  <style>
    /* =========================================================
       MAP LOCK
       ========================================================= */
    #map-wrapper {
      display: block;
      width: 100%;
      height: 480px;
      min-height: 480px;
      flex-shrink: 0;
      flex-grow: 0;
    }

    #map {
      display: block;
      width: 100%;
      height: 480px;
      min-height: 480px !important;
      max-height: 480px !important;
      border: 1px solid #1f2937;
      border-radius: 12px;
      overflow: hidden;
      box-sizing: border-box;
    }

    /* =========================================================
       MARKERS
       Blue = night parking
       Orange = otherwise
       Off-white ring = HDB
       Pink ring = JTC
       ========================================================= */
    .marker {
      width: 24px;
      height: 24px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-size: 12px;
      font-weight: 800;
      color: #fff;
      background: #f97316;          /* orange default = no night */
      border: 3px solid #e5e7eb;    /* HDB ring */
      position: relative;
      box-shadow: 0 2px 8px rgba(0,0,0,0.35);
      user-select: none;
      cursor: pointer;
    }

    .marker.night {
      background: #3b82f6;          /* blue = night parking */
    }

    .marker.jtc {
      border-color: #ec4899;        /* pink ring = JTC */
    }

    /* =========================================================
       AVAILABILITY LABEL
       Show only available counts with lot type indicators
       Example: C:120 H:5 Y:20
       Hide entirely if there is no availability info
       ========================================================= */
    .marker[data-avail]:not([data-avail=""])::after {
      content: attr(data-avail);
      position: absolute;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 6px;
      background: #16a34a; /* green */
      color: #fff;
      white-space: nowrap;
      line-height: 1.2;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }

    .marker[data-avail=""]::after {
      display: none;
    }

    /* =========================================================
       LEGEND
       ========================================================= */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin: 10px 0;
      font-size: 13px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .legend-marker {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 3px solid #e5e7eb;
    }

    .legend-orange { background: #f97316; }
    .legend-blue   { background: #3b82f6; }
    .legend-jtc    { border-color: #ec4899; }

    .hint {
      font-size: 12px;
      color: #9ca3af;
      margin-left: 6px;
    }

    .filter a {
      margin-left: 12px;
    }
  </style>
</head>

<body>
<div class="container">

  <h2>{{ app_title }}</h2>

  <!-- =========================================================
       SERVER FILTER
       ========================================================= -->
  <form method="get" class="filter">
    <input
      type="text"
      name="q"
      value="{{ q }}"
      placeholder="Search ALL carparks (server-side filter)"
    >

    <button type="submit">Load & Filter Dataset</button>
    <span class="hint">Filters data before loading</span>

    <a href="/?refresh=1{% if q %}&q={{ q }}{% endif %}">Refresh cache</a>
    <a href="/download.csv{% if q %}?q={{ q }}{% endif %}">Download CSV</a>
  </form>

  <!-- =========================================================
       CLIENT FILTER
       ========================================================= -->
  <input
    id="searchBox"
    placeholder="Filter displayed results instantly (table + map)">
  
  <!-- =========================================================
       LEGEND
       ========================================================= -->
  <div class="legend">
    <div class="legend-item">
      <div class="legend-marker legend-blue"></div>
      Night Parking
    </div>

    <div class="legend-item">
      <div class="legend-marker legend-orange"></div>
      No Night Parking
    </div>

    <div class="legend-item">
      <div class="legend-marker"></div>
      HDB
    </div>

    <div class="legend-item">
      <div class="legend-marker legend-jtc"></div>
      JTC
    </div>
  </div>

  <!-- =========================================================
       MAP
       ========================================================= -->
  <div id="map-wrapper">
    <div id="map"></div>
  </div>

  <!-- =========================================================
       TABLE
       Hide:
       - carpark_no_norm (internal matching key)
       - carpark_no (duplicate canonical column)
       ========================================================= -->
  <table id="tbl" class="display">
    <thead>
      <tr>
        <th>#</th>
        {% for c in column_keys %}
          {% if c not in ['carpark_no_norm', 'carpark_no'] %}
            <th>{{ c }}</th>
          {% endif %}
        {% endfor %}
      </tr>
    </thead>

    <tbody>
      {% for r in rows %}
      <tr
        data-lon="{{ r.get(lon_t_key) }}"
        data-lat="{{ r.get(lat_t_key) }}"
        data-cpnorm="{{ r.get('carpark_no_norm') }}"
        data-src="{{ r.get('data_source','') }}"
        data-night="{{ r.get('night_parking','') }}"
      >
        <td></td>
        {% for c in column_keys %}
          {% if c not in ['carpark_no_norm', 'carpark_no'] %}
            <td>{{ r.get(c) }}</td>
          {% endif %}
        {% endfor %}
      </tr>
      {% endfor %}
    </tbody>
  </table>

</div>

<script>
$(function(){

  /* =========================================================
     DATATABLE
     ========================================================= */
  const table = $('#tbl').DataTable({
    pageLength: 10,
    lengthMenu: [10, 25, 50, 100]
  });

  $('#searchBox').on('input', function(){
    table.search(this.value).draw();
  });

  /* =========================================================
     MAP
     ========================================================= */
  if (typeof maplibregl === 'undefined') {
    console.error('MapLibre failed to load.');
    return;
  }

  const map = new maplibregl.Map({
    container: 'map',
    center: {{ map_center|tojson }},
    zoom: 11,
    trackResize: false,
    style: {
      version: 8,
      sources: {
        onemap: {
          type: "raster",
          tiles: [
            "https://www.onemap.gov.sg/maps/tiles/Default/{z}/{x}/{y}.png"
          ],
          tileSize: 256
        }
      },
      layers: [
        { id: 'base', type: 'raster', source: 'onemap' }
      ]
    }
  });

  let markers = [];
  let availMap = {};

  /* =========================================================
     AVAILABILITY
     ========================================================= */
  async function loadAvailability(){
    try{
      const res = await fetch('/availability.json');
      const json = await res.json();
      availMap = json.data || {};
    }catch(e){
      console.error('Availability load failed', e);
    }
  }

  function buildAvail(cpNorm){
    const lots = availMap[cpNorm];
    if(!lots) return "";

    const parts = [];

    if(lots.C && lots.C.available != null) parts.push(`C:${lots.C.available}`);
    if(lots.H && lots.H.available != null) parts.push(`H:${lots.H.available}`);
    if(lots.Y && lots.Y.available != null) parts.push(`Y:${lots.Y.available}`);

    return parts.join(" ");
  }

  /* =========================================================
     MARKERS
     IMPORTANT:
     - Map follows the current DataTable page content
     - Changing entries per page updates markers correctly
     - Row numbers are recomputed correctly every draw
     ========================================================= */
  function rebuildMarkers(){
    markers.forEach(m => m.remove());
    markers = [];

    const rows = table.rows({ page: 'current' }).nodes().toArray();
    const pageInfo = table.page.info();
    const pageStart = pageInfo.start;  // 0-based index for current page

    rows.forEach((tr, idx) => {
      const rowNum = pageStart + idx + 1;

      const lon = parseFloat(tr.dataset.lon);
      const lat = parseFloat(tr.dataset.lat);

      // Always keep row numbers in sync
      tr.cells[0].innerText = rowNum;

      if (isNaN(lon) || isNaN(lat)) {
        return;
      }

      const el = document.createElement('div');
      el.className = 'marker';

      const src = (tr.dataset.src || '').toUpperCase();
      const night = (tr.dataset.night || '').toUpperCase();

      if (night === 'Y' || night === 'YES') {
        el.classList.add('night');
      }

      if (src === 'JTC') {
        el.classList.add('jtc');
      }

      const cpNorm = tr.dataset.cpnorm;
      el.setAttribute('data-avail', buildAvail(cpNorm));
      el.textContent = rowNum;

      markers.push(
        new maplibregl.Marker({ element: el })
          .setLngLat([lon, lat])
          .addTo(map)
      );
    });
  }

  /* =========================================================
     EVENTS
     - draw.dt is the authoritative redraw event for DataTables
     - covers search, page, order, and entries-per-page changes
     ========================================================= */
  table.on('draw.dt', rebuildMarkers);

  map.on('load', async () => {
    await loadAvailability();
    rebuildMarkers();

    setInterval(async () => {
      await loadAvailability();
      rebuildMarkers();
    }, 60000);
  });

});
</script>

</body>
</html>
