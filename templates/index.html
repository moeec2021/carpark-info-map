<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>{{ app_title }}</title>

<!-- ✅ CORRECT TAGS (CRITICAL FIX) -->
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css">

<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<link rel="stylesheet"
 href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

<style>
#map { height: 500px; margin: 12px 0; }

.marker {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  font-weight: 800;
  font-size: 12px;
  background: #fb923c;
  color: white;
}
</style>
</head>

<body>

<h2>{{ app_title }}</h2>

<!-- ✅ CLIENT SEARCH -->
<input id="searchBox" placeholder="Search..." />

<div id="map"></div>

<table id="tbl" class="display">
<thead>
<tr>
  <th>#</th>
  {% for c in column_keys %}
  <th>{{ c }}</th>
  {% endfor %}
</tr>
</thead>

<tbody>
{% for r in rows %}
<tr data-lon="{{ r.get(lon_t_key) }}"
    data-lat="{{ r.get(lat_t_key) }}">
<td></td>
{% for c in column_keys %}
<td>{{ r.get(c) }}</td>
{% endfor %}
</tr>
{% endfor %}
</tbody>
</table>

<script>

const table = $('#tbl').DataTable({
  pageLength: 10,
  lengthMenu: [10,25,50,100]
});

/* ✅ CLIENT SEARCH */
$('#searchBox').on('input', function(){
  table.search(this.value).draw();
});

const map = new maplibregl.Map({
  container:'map',
  center: {{ map_center|tojson }},
  zoom:11,
  style:{
    version:8,
    sources:{
      onemap:{
        type:"raster",
        tiles:["https://www.onemap.gov.sg/maps/tiles/Default/{z}/{x}/{y}.png"],
        tileSize:256
      }
    },
    layers:[{id:'base',type:'raster',source:'onemap'}]
  }
});

let markers=[];

/* ✅ FIXED MARKER LOGIC */
function rebuildMarkers(){

  markers.forEach(m => m.remove());
  markers = [];

  const rows = table.rows({page:'current'}).nodes().toArray();

  let i = 1;

  rows.forEach(tr => {

    const lon = parseFloat(tr.dataset.lon);
    const lat = parseFloat(tr.dataset.lat);

    tr.cells[0].innerText = i;

    if (!lon || !lat || isNaN(lon) || isNaN(lat)) {
      i++;
      return;
    }

    const el = document.createElement('div');
    el.className = 'marker';
    el.textContent = i;

    markers.push(
      new maplibregl.Marker({element: el})
        .setLngLat([lon, lat])
        .addTo(map)
    );

    i++;
  });
}

/* ✅ CRITICAL FIX: ONLY draw event */
table.on('draw.dt', rebuildMarkers);

/* ✅ INITIAL LOAD */
map.on('load', rebuildMarkers);

/* ✅ RESIZE SAFE */
function resizeFix(){
  map.resize();
  markers.forEach(m=>{
    const p = m.getLngLat();
    m.setLngLat(p);
  });
}

window.addEventListener('resize', resizeFix);
new ResizeObserver(resizeFix).observe(document.getElementById('map'));

</script>

</body>
</html>
