<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{ app_title }}</title>

  <!-- App CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

  <!-- DataTables CSS -->
  <link rel="stylesheet"
        href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <!-- DataTables JS -->
  <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

  <!-- ✅ OneMap JS SDK (CORRECT) -->
  <script src="https://www.onemap.gov.sg/maps/js/onemap.min.js"></script>
</head>

<body>
<div class="container">

  <h1>{{ app_title }}</h1>

  <p><strong>Resource ID:</strong> {{ resource_id }}</p>
  <p>
    <strong>Last fetched:</strong> {{ fetched_at }} |
    <strong>Total records:</strong> {{ total_ckan }}
  </p>

  <form method="get">
    <input type="text" name="q" value="{{ q }}" placeholder="Contains filter">
    <button type="submit">Search</button>
  </form>

  <h2>Map – First 10 Carparks</h2>
  <div id="map" style="height:480px; margin-bottom:20px;"></div>

  <h2>Carpark Data</h2>
  <table id="carparkTable" class="display">
    <thead>
      <tr>
        {% for col in columns %}
          <th>{{ col }}</th>
        {% endfor %}
      </tr>
    </thead>
    <tbody>
      {% for r in rows %}
        <tr>
          {% for col in columns %}
            <td>{{ r.get(col, "") }}</td>
          {% endfor %}
        </tr>
      {% endfor %}
    </tbody>
  </table>

</div>

<script>
$(document).ready(function () {

  // DataTable: first 10 rows by default
  var table = $('#carparkTable').DataTable({
    pageLength: 10,
    lengthMenu: [10, 25, 50, 100],
    scrollX: true,
    searching: false
  });

  // Initialise OneMap
  var map = new onemap.maps.Map('map', {
    center: [1.3521, 103.8198], // Singapore fallback
    zoom: 12
  });

  var bounds = new onemap.maps.LatLngBounds();
  var markerCount = 0;

  // Find latitude / longitude columns
  var latIdx = -1;
  var lonIdx = -1;

  table.columns().header().each(function (header, i) {
    var name = header.innerText.toLowerCase();
    if (name === 'latitude') latIdx = i;
    if (name === 'longitude') lonIdx = i;
  });

  // Plot first 10 carparks
  if (latIdx !== -1 && lonIdx !== -1) {
    table.rows({ page: 'current' }).every(function () {
      if (markerCount >= 10) return;

      var row = this.data();
      var lat = parseFloat(row[latIdx]);
      var lon = parseFloat(row[lonIdx]);

      if (!isNaN(lat) && !isNaN(lon)) {
        var marker = new onemap.maps.Marker({
          position: [lat, lon]
        });
        marker.addTo(map);
        bounds.extend([lat, lon]);
        markerCount++;
      }
    });

    if (markerCount > 0) {
      map.fitBounds(bounds);
    }
  }
});
</script>

</body>
</html>
