<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{{ app_title }}</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css">
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>

<link rel="stylesheet"
 href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

<style>
#map { height:480px; margin:12px 0 }

/* marker */
.marker{
  width:24px;height:24px;border-radius:50%;
  display:grid;place-items:center;font-weight:800;
  font-size:12px;

  background:#fb923c;
  color:#fff;
  border:2px solid #fff;
  position:relative;
}

.marker.night { background:#3b82f6 }

.marker.jtc{
  border-color:#ec4899;
  color:#f472b6;
}

/* availability label */
.marker[data-avail]:not([data-avail=""])::after{
  content:attr(data-avail);
  position:absolute;
  top:26px;left:50%;
  transform:translateX(-50%);
  font-size:10px;
  padding:2px 6px;
  border-radius:6px;
  color:#fff;
  white-space:nowrap;
}

.marker[data-avail=""]::after{ display:none }

.marker.avail-green::after{ background:#22c55e }
.marker.avail-amber::after{ background:#f59e0b }
.marker.avail-red::after{ background:#ef4444 }

</style>
</head>

<body>

<h2>{{ app_title }}</h2>

<div id="map"></div>

<table id="carparkTable">
<thead>
<tr>
<th>#</th>
{% for c in column_keys %}
<th>{{ c }}</th>
{% endfor %}
</tr>
</thead>

<tbody>
{% for r in rows %}
<tr
  data-lon="{{ r.get(lon_t_key,'') }}"
  data-lat="{{ r.get(lat_t_key,'') }}"
>
<td>{{ loop.index }}</td>
{% for c in column_keys %}
<td>{{ r.get(c,"") }}</td>
{% endfor %}
</tr>
{% endfor %}
</tbody>
</table>

<script>
$(function(){

const map=new maplibregl.Map({
  container:'map',
  center:{{ map_center|tojson }},
  zoom:12,
  style:{
    version:8,
    sources:{
      onemap:{
        type:"raster",
        tiles:["https://www.onemap.gov.sg/maps/tiles/Default/{z}/{x}/{y}.png"],
        tileSize:256
      }
    },
    layers:[{id:'base',type:'raster',source:'onemap'}]
  }
});

const table = $('#carparkTable').DataTable();

function norm(v){ return String(v||'').toLowerCase(); }

function findCol(match){
  let idx=-1;
  $('#carparkTable thead th').each(function(i){
    if(match(norm($(this).text()))) idx=i;
  });
  return idx;
}

const nightIdx=findCol(t=>t.includes('night'));
const srcIdx=findCol(t=>t.includes('source'));

const availC=findCol(t=>t.includes('available')&&t.includes('c'));
const totalC=findCol(t=>t.includes('total')&&t.includes('c'));

function buildAvail(row){
  let a=parseFloat(row[availC]);
  let t=parseFloat(row[totalC]);

  if(!a||!t) return {txt:"",r:null};

  let r=a/t;
  return {txt:`${a}/${t}`,r};
}

function level(r){
  if(r==null) return "";
  if(r>=0.2) return "avail-green";
  if(r>=0.05) return "avail-amber";
  return "avail-red";
}

let markers=[];

function rebuildMarkers(){

  markers.forEach(m=>m.remove());
  markers=[];

  let i=1;

  $('#carparkTable tbody tr:visible').each(function(){

    const lon=parseFloat($(this).data('lon'));
    const lat=parseFloat($(this).data('lat'));

    if(isNaN(lon)||isNaN(lat)) return;

    const row=table.row(this).data();

    const night = nightIdx>=0 && norm(row[nightIdx]).includes('yes');
    const jtc   = srcIdx>=0 && norm(row[srcIdx])==='jtc';

    const av=buildAvail(row);

    const el=document.createElement('div');
    el.className="marker "+(night?"night":"")+" "+(jtc?"jtc":"")+" "+level(av.r);
    el.innerText=i;
    el.setAttribute('data-avail',av.txt);

    const marker=new maplibregl.Marker({element:el})
      .setLngLat([lon,lat])
      .addTo(map);

    markers.push(marker);
    i++;
  });
}

// ✅ init
map.on('load', rebuildMarkers);
table.on('draw', rebuildMarkers);


// ✅ ✅ FINAL RESIZE FIX (NO DRIFT)
function handleResize(){
  map.resize();

  // ✅ DO NOT rebuild markers
  // ✅ only re-anchor them
  markers.forEach(m => {
    const pos = m.getLngLat();
    m.setLngLat(pos);
  });
}

let resizeTimer;

window.addEventListener('resize', ()=>{
  clearTimeout(resizeTimer);
  resizeTimer=setTimeout(handleResize,150);
});

const ro = new ResizeObserver(handleResize);
ro.observe(document.getElementById('map'));

});
</script>

</body>
</html>
