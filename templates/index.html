<script>
$(function(){

  if (typeof maplibregl === 'undefined') {
    console.error("MapLibre FAILED to load");
    return;
  }

  const table = $('#carparkTable').DataTable();

  const map = new maplibregl.Map({
    container:'map',
    center: {{ map_center|tojson }},
    zoom:12,
    style:{
      version:8,
      sources:{
        onemap:{
          type:"raster",
          tiles:["https://www.onemap.gov.sg/maps/tiles/Default/{z}/{x}/{y}.png"],
          tileSize:256
        }
      },
      layers:[{id:"base",type:"raster",source:"onemap"}]
    }
  });

  function norm(v){return String(v||'').toLowerCase();}

  function findCol(fn){
    let idx=-1;
    $('#carparkTable thead th').each(function(i){
      if(fn(norm($(this).text()))) idx=i;
    });
    return idx;
  }

  const lonIdx = findCol(t=>t.includes('longitude'));
  const latIdx = findCol(t=>t.includes('latitude'));
  const nightIdx = findCol(t=>t.includes('night'));
  const srcIdx = findCol(t=>t.includes('source'));

  let markers=[];

  function rebuild(){
    markers.forEach(m=>m.remove());
    markers=[];

    let n=1;

    table.rows({page:'current'}).every(function(){

      const row=this.data();

      const lon=parseFloat(row[lonIdx]);
      const lat=parseFloat(row[latIdx]);
      if(isNaN(lon)||isNaN(lat)) return;

      const night = nightIdx>=0 && norm(row[nightIdx]).includes('yes');
      const jtc   = srcIdx>=0 && norm(row[srcIdx])==='jtc';

      const el=document.createElement('div');
      el.className = `marker ${night?'blue':''} ${jtc?'jtc':''}`;
      el.textContent = n;

      el.setAttribute('data-avail','');

      markers.push(
        new maplibregl.Marker({element:el})
          .setLngLat([lon,lat])
          .addTo(map)
      );

      n++;
    });
  }

  map.on('load', rebuild);
  table.on('draw', rebuild);

});
</script>

</body>

  <style>
    #map {
      height: 480px;
      margin: 12px 0;
      border-radius: 12px;
    }

    .marker {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-weight: 800;
      color: #fff;
      font-size: 12px;

      /* ✅ ORANGE = no night parking */
      background: rgba(251,146,60,0.95);

      border: 2px solid rgba(255,255,255,0.9);
      position: relative;
    }

    /* ✅ Night parking */
    .marker.blue { background: rgba(59,130,246,0.95) !important; }

    /* ✅ JTC */
    .marker.jtc {
      border-color: #ec4899 !important;
      color: #f472b6 !important;
    }

    /* ✅ Availability OUTSIDE */
    .marker[data-avail]:not([data-avail=""])::after {
      content: attr(data-avail);
      position: absolute;
      top: 26px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 6px;
      background: rgba(0,0,0,0.75);
      color: #fff;
      white-space: nowrap;
    }

    .marker[data-avail=""]::after { display:none; }

    /* ✅ Availability color coding */
    .marker.avail-green::after { background:#22c55e; }
    .marker.avail-amber::after { background:#f59e0b; }
    .marker.avail-red::after   { background:#ef4444; }
  </style>
</head>
