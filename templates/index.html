<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ app_title }}</title>

  <!-- ✅ FIXED: Proper stylesheet loading -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

  <!-- ✅ FIXED: MapLibre correctly loaded -->
  <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet">
  <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>

  <!-- ✅ DataTables -->
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

  <style>
    #map {
      height: 480px;
      border-radius: 12px;
      margin: 12px 0;
    }

    .marker {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 12px;
      font-weight: 700;
      background: rgba(239,68,68,0.95);
      color: #ffffff;
      border: 2px solid rgba(255,255,255,0.9);
      box-shadow: 0 2px 8px rgba(0,0,0,0.35);
      cursor: pointer;
    }

    .marker.blue { background: rgba(59,130,246,0.95) !important; }
    .marker.red  { background: rgba(239,68,68,0.95) !important; }

    /* ✅ JTC */
    .marker.jtc {
      border-color: #ec4899 !important;
      color: #f472b6 !important;
    }
  </style>
</head>

<body>
<div class="container">

  <h1>{{ app_title }}</h1>

  <div class="banner">Dataset: {{ resource_id }}</div>

  <div class="legend">
    Fill: 🔵 Night parking | 🔴 No night parking
    &nbsp; • &nbsp;
    Dataset: 🟣 JTC | ⚪ HDB
  </div>

  <div id="map"></div>

  <table id="carparkTable" class="display">
    <thead>
      <tr>
        <th>#</th>
        {% for c in column_keys %}
          <th>{{ c.replace('_',' ') | title }}</th>
        {% endfor %}
      </tr>
    </thead>
    <tbody>
      {% for r in rows %}
      <tr>
        <td>{{ loop.index }}</td>
        {% for c in column_keys %}
          <td>{{ r.get(c, "") }}</td>
        {% endfor %}
      </tr>
      {% endfor %}
    </tbody>
  </table>

</div>

<script>
$(function () {

  // ✅ Safety guard
  if (typeof maplibregl === 'undefined') {
    console.error('MapLibre failed to load');
    return;
  }

  const table = $('#carparkTable').DataTable({
    pageLength: 10,
    scrollX: true
  });

  const map = new maplibregl.Map({
    container: 'map',
    center: {{ map_center | tojson }},
    zoom: 12,
    style: {
      version: 8,
      sources: {
        onemap: {
          type: 'raster',
          tiles: ['https://www.onemap.gov.sg/maps/tiles/Default/{z}/{x}/{y}.png'],
          tileSize: 256
        }
      },
      layers: [{ id: 'base', type: 'raster', source: 'onemap' }]
    }
  });

  function norm(v){ return String(v||'').toLowerCase(); }

  function findCol(match){
    let idx = -1;
    $('#carparkTable thead th').each(function(i){
      if (match(norm($(this).text()))) idx = i;
    });
    return idx;
  }

  const lonIdx = findCol(t => t.includes('longitude'));
  const latIdx = findCol(t => t.includes('latitude'));
  const srcIdx = findCol(t => t.includes('source'));
  const nightIdx = findCol(t => t.includes('night'));

  let markers = [];

  function rebuildMarkers() {
    markers.forEach(m => m.remove());
    markers = [];

    let n = 1;

    table.rows({page:'current'}).every(function(){
      const row = this.data();

      const lon = parseFloat(row[lonIdx]);
      const lat = parseFloat(row[latIdx]);
      if (isNaN(lon) || isNaN(lat)) return;

      const night = nightIdx >= 0 && norm(row[nightIdx]).includes('yes');
      const jtc   = srcIdx >= 0 && norm(row[srcIdx]) === 'jtc';

      const el = document.createElement('div');
      el.className = `marker ${night?'blue':'red'}${jtc?' jtc':''}`;
      el.textContent = n;

      markers.push(
        new maplibregl.Marker({element: el})
          .setLngLat([lon,lat])
          .addTo(map)
      );

      n++;
    });
  }

  map.on('load', rebuildMarkers);
  table.on('draw', rebuildMarkers);

});
</script>

</body>
</html>
